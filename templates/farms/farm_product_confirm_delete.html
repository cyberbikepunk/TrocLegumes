{% extends 'base.html' %}

{% block title %}Supprimer {{ object.name }} — TrocLégumes{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="h3 mb-4">Supprimer le produit</h1>
        <div class="alert alert-danger">
            <i class="bi bi-exclamation-triangle me-2"></i>
            Êtes-vous sûr de vouloir supprimer le produit <strong>{{ object.name }}</strong> ?
            Cette action est irréversible.
        </div>
        <form method="post" novalidate>
            {% csrf_token %}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger">
                    <i class="bi bi-trash me-1"></i>Supprimer
                </button>
                <a href="{% url 'farms:product_list' %}" class="btn btn-outline-secondary">
                    Annuler
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
